version: "3.9"

# ══════════════════════════════════════════════════════════════════
#  Local development — dashboard only
#
#  The production system runs on Railway (single Dockerfile, SQLite
#  on a persistent volume).  This compose file is for local dev only.
#
#  Quick start:
#    cp .env.example .env          # copy template (fill in API keys)
#    docker compose up dashboard   # start the Streamlit dashboard
#    docker compose up -d          # background mode
#    docker compose logs -f        # follow logs
# ══════════════════════════════════════════════════════════════════

services:

  # ── Streamlit Dashboard ────────────────────────────────────────
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      streamlit run dashboard/app.py
        --server.port=8501
        --server.address=0.0.0.0
        --server.headless=true
    ports:
      - "8501:8501"                        # Dashboard UI
    volumes:
      - .:/app
      - /app/__pycache__
    env_file:
      - path: .env
        required: false
    environment:
      # ENVIRONMENT — controls log verbosity and safety guards
      - ENVIRONMENT=development
      # ANTHROPIC_API_KEY — required for Claude sentiment scoring
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # NEWSAPI_KEY — required for headline fetching
      - NEWSAPI_KEY=${NEWSAPI_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8501/healthz"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
