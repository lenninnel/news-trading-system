[build]
builder            = "DOCKERFILE"
dockerfilePath     = "Dockerfile"

[deploy]
startCommand       = "sh /app/entrypoint.sh"
healthcheckPath    = "/_stcore/health"
healthcheckTimeout = 120
restartPolicyType  = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas        = 1
sleepApplication   = false
