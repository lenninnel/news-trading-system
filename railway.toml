[build]
builder            = "DOCKERFILE"
dockerfilePath     = "Dockerfile"

[deploy]
startCommand       = "sh -c 'python3 -m scheduler.daily_runner & exec streamlit run dashboard/app.py --server.port=${PORT} --server.address=0.0.0.0 --server.headless=true --server.enableCORS=false'"
healthcheckPath    = "/_stcore/health"
healthcheckTimeout = 300
restartPolicyType  = "ON_FAILURE"
restartPolicyMaxRetries = 10
numReplicas        = 1
