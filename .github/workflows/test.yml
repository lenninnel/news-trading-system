name: Test Suite

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # alpaca-trade-api declares websockets<11 but only uses REST;
          # yfinance needs websockets>=13.  Two-step install to avoid
          # the pip resolver conflict (same approach as Dockerfile).
          grep -v '^alpaca-trade-api' requirements.txt > /tmp/req_no_alpaca.txt
          pip install -r /tmp/req_no_alpaca.txt -r requirements-test.txt
          pip install --no-deps alpaca-trade-api==3.2.0

      - name: Run unit tests
        run: |
          python -m pytest tests/ \
            -m "not integration and not slow" \
            -q --tb=short \
            --ignore=tests/load_test_dashboard.py
        env:
          DB_PATH: /tmp/test_trading.db
          ANTHROPIC_API_KEY: dummy_key_for_tests
          NEWSAPI_KEY: dummy_key_for_tests

  schema-check:
    name: Schema Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Same two-step install as unit-tests job (see comment there).
          grep -v '^alpaca-trade-api' requirements.txt > /tmp/req_no_alpaca.txt
          pip install -r /tmp/req_no_alpaca.txt
          pip install --no-deps alpaca-trade-api==3.2.0

      - name: Verify all tables are created
        run: |
          python3 -c "
          import sqlite3, sys, os
          os.environ['DB_PATH'] = '/tmp/schema_check.db'
          os.environ['ANTHROPIC_API_KEY'] = 'dummy'
          os.environ['NEWSAPI_KEY'] = 'dummy'
          from storage.database import Database
          db = Database('/tmp/schema_check.db')
          conn = sqlite3.connect('/tmp/schema_check.db')
          tables = {r[0] for r in conn.execute(
              \"SELECT name FROM sqlite_master WHERE type='table'\"
          ).fetchall()}
          conn.close()
          required = {
              'runs', 'headline_scores', 'technical_signals', 'combined_signals',
              'risk_calculations', 'portfolio_positions', 'trade_history',
          }
          missing = required - tables
          if missing:
              print(f'FAIL: missing tables: {missing}', file=sys.stderr)
              sys.exit(1)
          print(f'OK: {len(tables)} tables present (required: {len(required)})')
          "

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: news-trading-system:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
